aid: tallyman
name: Tallyman
description: >-
  Tallyman is Experian's collections and recoveries management software platform,
  acquired from Talgentra. It provides an end-to-end collections management system
  for financial services, utilities, telecommunications, and public sector
  organizations. The platform manages customer segmentation, contact strategies,
  decision automation, and analytics for debt collection operations. Tallyman
  integrates with Experian Decision Analytics, CRM systems, billing platforms,
  and external data sources via web services. It is available as a hosted service
  managed through Experian's data centres.
